# tmux設定ファイル - 最小限動作保証版

# プレフィックスキーをCtrl+aに変更
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# 設定ファイルの再読み込み
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ウィンドウ・ペインのインデックスを1から始める
set -g base-index 1
setw -g pane-base-index 1

# マウスの有効化
set -g mouse on

# カラー設定
set -g default-terminal "screen-256color"

# エスケープ時間の短縮
set -sg escape-time 0

# ヒストリーの行数を増やす
set -g history-limit 10000

# ステータスバー設定（最小限）
set -g status-bg black
set -g status-fg white

# 分割キーの直感版（| で左右、- で上下）
# 分割後のカレントディレクトリも引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================================
# Ctrl+W + hjkl でペイン移動 (Vim の window navigation と同じ感覚)
# - nvim で使用中の場合は Ctrl+W をそのまま nvim に渡す
# - Ctrl+W を2回連打 → zsh の「単語削除」として動作
# ============================================================================
bind-key -n C-w if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE '(^|/)n?vim(diff)?$'" \
    "send-keys C-w" "switch-client -T winmove"
bind-key -T winmove h select-pane -L
bind-key -T winmove j select-pane -D
bind-key -T winmove k select-pane -U
bind-key -T winmove l select-pane -R
bind-key -T winmove C-w send-keys C-w

# デフォルトキーバインド（確実に動作）
# Ctrl+a % で左右分割（| でも可）
# Ctrl+a " で上下分割（- でも可）
# Ctrl+a d でデタッチ
# Ctrl+a c で新ウィンドウ作成

 